version: '3.8'

services:
  drsai-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drsai-assistant
    ports:
      - "42818:42818"
    volumes:
      # 挂载工作空间以持久化数据
      - ./workspace:/app/workspace
      # 挂载 .env 文件（如果存在）
      - ./.env:/app/.env:ro
    environment:
      # 从 .env 文件或这里设置环境变量
      - HEPAI_API_KEY=${HEPAI_API_KEY:-}
      - RAGFLOW_URL=${RAGFLOW_URL:-}
      - RAGFLOW_TOKEN=${RAGFLOW_TOKEN:-}
      - MEMORY_DATASET_ID=${MEMORY_DATASET_ID:-}
    restart: unless-stopped
    # 如果需要使用 Docker-in-Docker（用于 DockerCommandLineCodeExecutor）
    # privileged: true
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock
